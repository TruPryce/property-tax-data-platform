name: Defect
description: Report incorrect, missing, unsafe, or regressed platform behavior.
title: "bug: "
body:
  - type: textarea
    id: observed
    attributes:
      label: Observed behavior
      description: Include release IDs, run IDs, logs with secrets removed, or other reproducible evidence.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: Link the governing OpenSpec requirement when one exists.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest safe reproduction without attaching full county data.
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Publication blocked
        - Incorrect customer data
        - Missing or stale data
        - Operational failure
        - Developer workflow only
    validations:
      required: true
  - type: checkboxes
    id: confirmations
    attributes:
      label: Confirmations
      options:
        - label: Evidence is redacted and contains no credentials or protected owner data.
          required: true
