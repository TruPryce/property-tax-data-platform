        run: |
          cd prepared && sha256sum --check checksums.sha256 && cd ..
          python3 - "$TRIGGER_B64" "$RUNNER_TEMP/trigger.json" <<'PY'
          import base64, pathlib, sys
          pathlib.Path(sys.argv[2]).write_bytes(base64.urlsafe_b64decode(sys.argv[1] + "=" * (-len(sys.argv[1]) % 4)))
          PY
          mkdir -p "trusted/.ai/contexts/$COUNTYFORGE_RUN_ID"
          cp prepared/planning/countyforge-planning-packet.json "trusted/.ai/contexts/$COUNTYFORGE_RUN_ID/"
          cp prepared/planning/countyforge-context-manifest.json "trusted/.ai/contexts/$COUNTYFORGE_RUN_ID/"
          cd trusted
          uv sync --frozen --package countyforge-github
          uv run --package countyforge-github countyforge-github build-run-request \
            --trigger "$RUNNER_TEMP/trigger.json" --target-root "$GITHUB_WORKSPACE/prepared/target.git" \
            --planning-packet ".ai/contexts/$COUNTYFORGE_RUN_ID/countyforge-planning-packet.json" \
            --context-manifest ".ai/contexts/$COUNTYFORGE_RUN_ID/countyforge-context-manifest.json" \
            > "$RUNNER_TEMP/countyforge-request.json"
          export CODEX_MODEL_REF="$(jq -r '.provider.model_ref' "$RUNNER_TEMP/countyforge-request.json")"
          export CODEX_REASONING_EFFORT="$(jq -r '.reasoning_effort' "$RUNNER_TEMP/countyforge-request.json")"
          CODEX_PROVIDER=openai ./.ai/codex/07-build-countyforge-plan-image.sh

      - name: Invoke OpenAI under the read-only plan profile
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          cd "$GITHUB_WORKSPACE/trusted"
          set +e
          uv run --package countyforge-runner countyforge-runner run \
            --request "$RUNNER_TEMP/countyforge-request.json" --contract-root "$GITHUB_WORKSPACE/trusted" \
            --target-root "$GITHUB_WORKSPACE/prepared/target.git" --json > "$RUNNER_TEMP/countyforge-result.json"
          echo "$?" > "$RUNNER_TEMP/countyforge-exit-code"
          set -e
      - name: Upload sanitized planning evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: countyforge-result-${{ inputs.run_id }}
          path: |
            ${{ runner.temp }}/countyforge-result.json
            ${{ runner.temp }}/countyforge-exit-code
            trusted/.ai/reviews/countyforge/plan
          if-no-files-found: error
          retention-days: 14
          include-hidden-files: true

