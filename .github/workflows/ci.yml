name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.12"

      - name: Sync workspace
        run: uv sync --locked --all-packages --group dev

      - name: Install Bubblewrap sandbox
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends bubblewrap
          command -v bwrap
          bwrap --version

      - name: Scan for secrets
        run: uv run pre-commit run detect-secrets --all-files --show-diff-on-failure

      - name: Reject county source artifacts
        run: uv run python scripts/check_repository_artifacts.py

      - name: Lint
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

      - name: Check documentation links
        run: uv run python scripts/check_doc_links.py

      - name: Validate OpenSpec
        run: npx --yes @fission-ai/openspec@1.6.0 validate --all --strict --no-interactive

      - name: TEMP sandbox executable diagnostic
        run: |
          echo "PATH=$PATH" | tr ':' '\n' | sed -n '1,12p'
          echo "command -v python3: $(command -v python3)"
          echo "readlink -f python3: $(readlink -f "$(command -v python3)")"
          echo "ls -l /usr/bin/python3*: "; ls -l /usr/bin/python3* 2>/dev/null || true
          uv run python scripts/dev-loop/diagnose-sandbox-executable.py || true
          echo "--- namespace / apparmor state ---"
          echo "bwrap version: $(bwrap --version 2>&1)"
          echo "apparmor_restrict_unprivileged_userns: $(cat /proc/sys/kernel/apparmor_restrict_unprivileged_userns 2>/dev/null || echo n/a)"
          echo "unprivileged_userns_clone: $(cat /proc/sys/kernel/unprivileged_userns_clone 2>/dev/null || echo n/a)"
          echo "max_user_namespaces: $(cat /proc/sys/user/max_user_namespaces 2>/dev/null || echo n/a)"
          bwrap --unshare-net --ro-bind /usr /usr --ro-bind /bin /bin --ro-bind /lib /lib --ro-bind /lib64 /lib64 --proc /proc --dev /dev --tmpfs /tmp -- /usr/bin/true 2>&1; echo "  exit(unshare-net,true)=$?"
          bwrap --ro-bind /usr /usr --ro-bind /bin /bin --ro-bind /lib /lib --ro-bind /lib64 /lib64 --proc /proc --dev /dev --tmpfs /tmp -- /usr/bin/true 2>&1; echo "  exit(no-net,true)=$?"

      - name: Validate legacy and CountyForge runner contracts
        run: make runner-contract-tests
