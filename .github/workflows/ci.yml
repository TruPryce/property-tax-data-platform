name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Install uv and Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"
          python-version: "3.12"

      - name: Sync workspace
        run: uv sync --locked --all-packages --group dev

      - name: Scan for secrets
        run: uv run pre-commit run detect-secrets --all-files --show-diff-on-failure

      - name: Reject county source artifacts
        run: uv run python scripts/check_repository_artifacts.py

      - name: Lint
        run: |
          uv run ruff format --check .
          uv run ruff check .

      - name: Type check
        run: uv run mypy

      - name: Test
        run: uv run pytest

      - name: Check documentation links
        run: uv run python scripts/check_doc_links.py

      - name: Validate OpenSpec
        run: npx --yes @fission-ai/openspec@1.6.0 validate --all --strict --no-interactive
